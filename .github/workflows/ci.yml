name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...

  release-config:
    name: GoReleaser Config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./fibe/... -count=1 -timeout 30s -race

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: [lint, release-config, test]
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          go build -ldflags "-s -w -X main.version=ci-$(git rev-parse --short HEAD)" \
            -o dist/fibe-${GOOS}-${GOARCH}${EXT} ./cmd/fibe
      - uses: actions/upload-artifact@v4
        with:
          name: fibe-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  notify-slack:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.build.result == 'success' }}
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Post binary build message
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL is not set; skipping Slack notification."
            exit 0
          fi

          node <<'NODE'
          const sha = process.env.GITHUB_SHA || '';
          const shortSha = sha.slice(0, 12);
          const repo = process.env.GITHUB_REPOSITORY;
          const server = process.env.GITHUB_SERVER_URL || 'https://github.com';
          const runUrl = `${server}/${repo}/actions/runs/${process.env.GITHUB_RUN_ID}`;
          const commitUrl = `${server}/${repo}/commit/${sha}`;
          const branch = process.env.GITHUB_REF_NAME || 'main';
          const version = `ci-${shortSha}`;
          const artifacts = [
            'fibe-linux-amd64',
            'fibe-linux-arm64',
            'fibe-darwin-amd64',
            'fibe-darwin-arm64',
            'fibe-windows-amd64',
          ];
          const payload = {
            text: `[${repo}] SDK binaries are ready: ${version}`,
            blocks: [
              {
                type: 'section',
                text: {
                  type: 'mrkdwn',
                  text: `*[${repo}]* SDK binaries are ready`,
                },
              },
              {
                type: 'section',
                fields: [
                  { type: 'mrkdwn', text: `*Version*\n\`${version}\`` },
                  { type: 'mrkdwn', text: `*Branch*\n\`${branch}\`` },
                  { type: 'mrkdwn', text: `*Commit*\n<${commitUrl}|\`${shortSha}\`>` },
                  { type: 'mrkdwn', text: `*Downloads*\n<${runUrl}|GitHub Actions artifacts>` },
                ],
              },
              {
                type: 'section',
                text: {
                  type: 'mrkdwn',
                  text: `*Artifacts*\n${artifacts.map((name) => `• \`${name}\``).join('\n')}`,
                },
              },
            ],
          };

          const response = await fetch(process.env.SLACK_WEBHOOK_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          if (!response.ok) {
            console.log(`::warning::Failed to notify Slack webhook: ${response.status} ${response.statusText}`);
          }
          NODE
