name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...

  release-config:
    name: GoReleaser Config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./fibe/... -count=1 -timeout 30s -race

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: [lint, release-config, test]
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          go build -ldflags "-s -w -X main.version=ci-$(git rev-parse --short HEAD)" \
            -o dist/fibe-${GOOS}-${GOARCH}${EXT} ./cmd/fibe
      - uses: actions/upload-artifact@v4
        with:
          name: fibe-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  notify-slack:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.build.result == 'success' }}
    env:
      SLACK_WORKFLOW_URL: ${{ secrets.SLACK_WORKFLOW_URL }}
    steps:
      - name: Post deployment message
        run: |
          if [ -z "$SLACK_WORKFLOW_URL" ]; then
            echo "SLACK_WORKFLOW_URL is not set; skipping Slack notification."
            exit 0
          fi

          if ! curl -fsS -X POST \
            -H "Content-Type: application/json" \
            -d '{"message":"New binary is ready"}' \
            "$SLACK_WORKFLOW_URL"; then
            echo "::warning::Failed to notify Slack workflow."
          fi
