name: Integration (Live)

on:
  workflow_dispatch:
    inputs:
      fibe_domain:
        description: Fibe API domain for live integration tests
        required: true
        default: localhost:3000

permissions:
  contents: read

jobs:
  integration:
    name: Live integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./integration/... -v -count=1 -timeout 600s
        env:
          FIBE_API_KEY: ${{ secrets.FIBE_API_KEY }}
          USER_B_API_KEY: ${{ secrets.USER_B_API_KEY }}
          RATE_LIMIT_TEST_KEY: ${{ secrets.RATE_LIMIT_TEST_KEY }}
          FIBE_DOMAIN: ${{ inputs.fibe_domain }}
          WEBHOOK_CATCHER_HOST: ${{ secrets.WEBHOOK_CATCHER_HOST }}
          WEBHOOK_CATCHER_SCHEME: ${{ secrets.WEBHOOK_CATCHER_SCHEME }}
