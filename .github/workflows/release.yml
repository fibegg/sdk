name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Unit tests before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test ./fibe/... -count=1 -timeout 30s -race

  release:
    name: GoReleaser
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
      - name: Notify Slack
        if: ${{ github.ref_type == 'tag' && startsWith(github.ref_name, 'v') }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL is not set; skipping Slack notification."
            exit 0
          fi

          if [ "${GITHUB_REF_TYPE:-}" != "tag" ] || [ -z "${GITHUB_REF_NAME:-}" ]; then
            echo "No release tag is assigned to this run; skipping Slack notification."
            exit 0
          fi

          tag="$GITHUB_REF_NAME"
          version="${tag#v}"
          repo="$GITHUB_REPOSITORY"
          server="${GITHUB_SERVER_URL:-https://github.com}"
          release_url="$server/$repo/releases/tag/$tag"
          download_url="$server/$repo/releases/download/$tag"
          sha="${GITHUB_SHA:-}"
          short_sha="${sha:0:12}"
          commit_url="$server/$repo/commit/$sha"
          artifact_links="- <$download_url/fibe_${version}_linux_amd64.tar.gz|fibe_${version}_linux_amd64.tar.gz>
          - <$download_url/fibe_${version}_linux_arm64.tar.gz|fibe_${version}_linux_arm64.tar.gz>
          - <$download_url/fibe_${version}_darwin_amd64.tar.gz|fibe_${version}_darwin_amd64.tar.gz>
          - <$download_url/fibe_${version}_darwin_arm64.tar.gz|fibe_${version}_darwin_arm64.tar.gz>
          - <$download_url/fibe_${version}_windows_amd64.zip|fibe_${version}_windows_amd64.zip>
          - <$download_url/checksums.txt|checksums.txt>"

          payload="$(jq -n \
            --arg repo "$repo" \
            --arg tag "$tag" \
            --arg short_sha "$short_sha" \
            --arg commit_url "$commit_url" \
            --arg release_url "$release_url" \
            --arg artifact_links "$artifact_links" \
            '{
              text: ("[" + $repo + "] SDK release " + $tag + " is ready: " + $release_url),
              blocks: [
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: ("*[" + $repo + "]* SDK release `" + $tag + "` is ready")
                  }
                },
                {
                  type: "section",
                  fields: [
                    { type: "mrkdwn", text: ("*Version*\n`" + $tag + "`") },
                    { type: "mrkdwn", text: ("*Commit*\n<" + $commit_url + "|`" + $short_sha + "`>") },
                    { type: "mrkdwn", text: ("*Release*\n<" + $release_url + "|GitHub release>") },
                    { type: "mrkdwn", text: "*Homebrew*\n`brew install fibegg/sdk/fibe`" }
                  ]
                },
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: ("*Artifacts*\n" + $artifact_links)
                  }
                }
              ]
            }')"

          if ! curl -fsS -X POST -H 'Content-Type: application/json' --data "$payload" "$SLACK_WEBHOOK_URL" >/dev/null; then
            echo "::warning::Failed to notify Slack webhook."
          fi
